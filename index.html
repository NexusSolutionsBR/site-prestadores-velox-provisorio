<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Formulário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!-- Card de Redirecionamento -->
    <main class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden text-center p-8 md:p-12">
        
        <!-- Ícone ou Logo -->
        <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-4">Formulário de Inscrição</h1>
        
        <p class="text-gray-600 mb-8 leading-relaxed">
            Este formulário requer o envio de arquivos. Por segurança, clique no botão abaixo para preenchê-lo diretamente no Google Forms.
        </p>

        <!-- Botão Principal -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdFL7K45XOn9FAjGcOnAeH6Zf6VwHY-2bTumZFHScbtBSHwIA/viewform?usp=dialog" 
           target="_blank" 
           class="inline-block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-200">
            Abrir Formulário
        </a>

        <p class="text-xs text-gray-400 mt-6 flex items-center justify-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            Conexão segura via Google Drive
        </p>
    </main>

</body>
</html>
