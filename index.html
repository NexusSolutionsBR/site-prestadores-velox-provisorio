<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox - Portal de Documentação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; /* Fundo da página agora é branco puro */
        }

        .velox-yellow {
            background-color: #fbd304;
        }

        /* Sombra suave para o cartão se destacar no fundo branco */
        .card-shadow {
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.05);
        }

        .btn-shadow {
            box-shadow: 0 10px 25px -5px rgba(251, 211, 4, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Card Principal -->
    <main class="max-w-xl w-full bg-white rounded-[2.5rem] card-shadow overflow-hidden p-10 md:p-16 flex flex-col items-center border border-gray-100 border-t-[6px] border-t-[#fbd304]">
        
        <!-- Espaço para o Logótipo -->
        <div class="mb-12 w-full flex justify-center bg-white">
            <img src="logo.png" 
                 alt="Velox Soluções Técnicas" 
                 class="max-h-32 w-auto object-contain bg-white">
        </div>

        <!-- Título -->
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-extrabold text-[#0f172a] tracking-tight uppercase mb-3">
                Formulário de Inscrição
            </h1>
            <!-- Sublinhado Amarelo -->
            <div class="w-12 h-1.5 velox-yellow mx-auto rounded-full"></div>
        </div>

        <!-- Texto Descritivo -->
        <p class="text-center text-gray-500 text-base leading-relaxed mb-12 max-w-sm">
            Para garantir a integridade dos seus dados e o processamento seguro de ficheiros, o preenchimento deve ser concluído na plataforma oficial Google Forms.
        </p>

        <!-- Botão de Ação -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf6-M19v5k9p8vX5O0Z6-2L3e5u1-Z1A/viewform" 
           target="_blank" 
           class="w-full velox-yellow hover:bg-[#eec800] text-black font-bold py-5 px-8 rounded-2xl transition-all flex items-center justify-center gap-3 btn-shadow group uppercase tracking-wider text-sm">
            Abrir Formulário
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
        </a>

        <!-- Espaçador Inferior -->
        <div class="mt-10"></div>
    </main>

</body>
</html>
